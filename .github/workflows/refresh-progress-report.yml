name: Refresh Progress Report

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-progress-report
  cancel-in-progress: false

jobs:
  refresh:
    name: Regenerate SVG dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Regenerate progress dashboard
        run: |
          cargo run --release --bin classyfire-progress-report -- \
            --zenodo-doi \
            --pubchem-total-rows 123541080 \
            --output classyfire-progress.svg

      - name: Commit updated SVG
        run: |
          if git diff --quiet -- classyfire-progress.svg; then
            echo "No progress dashboard changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add classyfire-progress.svg
          git commit -m "Refresh progress dashboard"
          git push
